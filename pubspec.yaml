name: webwrapper
description: "Aplikasi donasi Simziwah - WebWrapper Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  flutter_inappwebview: ^6.1.0

  permission_handler: ^11.3.1

  image_picker: ^1.0.7
  camera: ^0.11.0+2

  url_launcher: ^6.3.1
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/splash.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/splash.png

  android: true
  ios: false
  web: false

  android_12:
    color: "#FFFFFF"
    image: assets/splash.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21